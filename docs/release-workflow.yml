# NOTE: GitHub blocked writing this directly to .github/workflows/ because the
# connected token lacks the `workflow` scope. To activate PyPI publishing:
#   1. Move this file to .github/workflows/release.yml
#   2. Configure a PyPI Trusted Publisher at
#      https://pypi.org/manage/project/allowscanner/settings/publishing/
#      (workflow: release.yml, environment: pypi)
#   3. Push a tag like `v2.0.1` to trigger build + publish.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Uses PyPI Trusted Publishing (OIDC) — no API token needed.
    # Configure the publisher once at https://pypi.org/manage/project/allowscanner/settings/publishing/
    environment:
      name: pypi
      url: https://pypi.org/project/allowscanner/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
