name: "allowScanner"
description: "Run allowScanner async web security scan and emit SARIF for GitHub code scanning."
branding:
  icon: "shield"
  color: "purple"

inputs:
  target:
    description: "Target URL or host to scan"
    required: true
  format:
    description: "Output format (terminal, json, markdown, html, sarif)"
    required: false
    default: "sarif"
  output:
    description: "Path to write the report to"
    required: false
    default: "allowscanner.sarif"
  args:
    description: "Extra CLI arguments passed verbatim to allowscanner"
    required: false
    default: ""
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"
  upload-sarif:
    description: "Upload the SARIF report to GitHub code scanning"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install allowScanner
      shell: bash
      run: pip install "allowscanner @ git+https://github.com/${{ github.repository }}@${{ github.sha }}"

    - name: Run scan
      shell: bash
      run: |
        allowscanner "${{ inputs.target }}" \
          -f "${{ inputs.format }}" \
          -o "${{ inputs.output }}" \
          ${{ inputs.args }} || true

    - name: Upload SARIF
      if: ${{ inputs.upload-sarif == 'true' && inputs.format == 'sarif' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.output }}
